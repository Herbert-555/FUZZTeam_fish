name: Build Base EXE

on:
  push:
    paths:
      - 'client/collector.py'
      - 'server/exe_builder.py'
      - 'server/icon_extractor.py'
      - 'output/icons/*.ico'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build base EXE variants
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from server.exe_builder import build_all_base_exes
          paths = build_all_base_exes()
          print('Base EXEs built:')
          print('\n'.join(paths))
          "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: collector_base
          path: client/collector_base*.exe
          retention-days: 90
