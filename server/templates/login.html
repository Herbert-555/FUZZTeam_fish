<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - FUZZTeam_fish</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-container {
            max-width: 400px;
            margin: 80px auto;
            padding: 40px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
        }
        .login-container h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .login-container .subtitle {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 28px;
        }
        .login-container .form-group {
            margin-bottom: 16px;
        }
        .login-container label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .login-container input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .login-container input:focus {
            outline: none;
            border-color: #4361ee;
        }
        .login-container .btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-top: 8px;
        }
        .login-error {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
        }
    </style>
</head>
<body style="background:#f0f2f5;">
    <div class="login-container">
        <h1>🐟 FUZZTeam_fish</h1>
        <p class="subtitle">钓鱼演练系统</p>

        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>账号</label>
                <input type="text" name="username" placeholder="请输入账号" autofocus>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" placeholder="请输入密码">
            </div>
            <button type="submit" class="btn btn-primary">登 录</button>
        </form>
    </div>
</body>
</html>
