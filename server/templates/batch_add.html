{% extends "base.html" %}
{% block title %}批量导入 - 钓鱼演练系统{% endblock %}
{% block content %}
<h1 style="margin-bottom:16px;">批量导入目标</h1>

<div class="btn-group" style="margin-bottom:16px;">
    <a href="{{ url_for('routes_web.download_import_template', type='xlsx') }}" class="btn btn-primary">下载Excel模板</a>
    <a href="{{ url_for('routes_web.download_import_template', type='csv') }}" class="btn" style="background:#e9c46a;">下载CSV模板</a>
</div>

<div class="card">
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>目标数据</label>
            <textarea name="batch_data" placeholder="每行一个目标，格式：姓名,邮箱,部门,EXE文件名&#10;仅姓名必填，EXE文件名可为空，空时使用统一名称模板&#10;例如：&#10;张三,zhangsan@company.com,技术部,张三方案&#10;李四,lisi@company.com,财务部,&#10;王五,wangwu@company.com"></textarea>
        </div>
        <div class="form-group">
            <label>导入文件</label>
            <input type="file" name="target_file" accept=".csv,.xlsx">
            <span style="color:#888;font-size:12px;">支持 CSV/xlsx，列顺序：姓名、邮箱、部门、EXE文件名；可包含表头。</span>
        </div>
        <div style="color:#888;font-size:13px;margin-bottom:12px;">
            每行一个目标，英文逗号分隔。仅姓名必填。EXE文件名不需要填写 .exe；为空时使用统一名称模板。
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">批量导入</button>
            <a href="{{ url_for('routes_web.targets') }}" class="btn" style="background:#eee;">返回</a>
        </div>
    </form>
</div>
{% endblock %}
