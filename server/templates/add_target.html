{% extends "base.html" %}
{% block title %}添加目标 - 钓鱼演练系统{% endblock %}
{% block content %}
<h1 style="margin-bottom:16px;">添加目标</h1>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label>姓名 *</label>
            <input type="text" name="name" placeholder="目标姓名" required>
        </div>
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" name="email" placeholder="target@company.com">
        </div>
        <div class="form-group">
            <label>部门</label>
            <input type="text" name="department" placeholder="如：技术部">
        </div>
        <div class="form-group">
            <label>EXE文件名</label>
            <input type="text" name="exe_filename" placeholder="为空时使用统一名称模板，不需要填写 .exe">
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">添加</button>
            <a href="{{ url_for('routes_web.targets') }}" class="btn" style="background:#eee;">取消</a>
        </div>
    </form>
</div>
{% endblock %}
